<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人书房</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:#f5f7fa;color:#1e293b;min-height:100vh}
.page{display:none}.page.active{display:block}
.card{background:#fff;border-radius:12px;border:1px solid #eef0f5;padding:20px}
.card-blue{border-left:4px solid #60a5fa}
.btn{padding:8px 20px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:500}
.btn-primary{background:#3b82f6;color:#fff}.btn-primary:hover{background:#2563eb}
.btn-outline{background:#fff;color:#3b82f6;border:1.5px solid #3b82f6}.btn-outline:hover{background:#eff6ff}
.btn-sm{padding:4px 12px;font-size:12px;border-radius:6px}
.btn-danger{background:#fee2e2;color:#dc2626}.btn-danger:hover{background:#fecaca}
.btn-success{background:#dcfce7;color:#16a34a}
.input{border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 12px;font-size:14px;width:100%;outline:none}
.input:focus{border-color:#3b82f6}
textarea.input{resize:vertical;min-height:80px}
.tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;margin:2px}
.tag-blue{background:#dbeafe;color:#2563eb}.tag-green{background:#dcfce7;color:#16a34a}
.tag-amber{background:#fef3c7;color:#d97706}.tag-purple{background:#f3e8ff;color:#9333ea}.tag-red{background:#fee2e2;color:#dc2626}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.badge-blue{background:#dbeafe;color:#2563eb}.badge-green{background:#dcfce7;color:#16a34a}
.badge-red{background:#fee2e2;color:#dc2626}.badge-gray{background:#f1f5f9;color:#64748b}
.sidebar{position:fixed;left:0;top:0;width:200px;height:100vh;background:#fff;border-right:1px solid #eef0f5;padding:20px 0;z-index:100;display:flex;flex-direction:column}
.sidebar-logo{padding:0 20px 20px;font-size:18px;font-weight:700;border-bottom:1px solid #eef0f5;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.nav-item{display:flex;align-items:center;gap:8px;padding:10px 20px;font-size:13px;color:#64748b;cursor:pointer;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:#f8fafc;color:#1e293b}
.nav-item.active{background:#eff6ff;color:#3b82f6;font-weight:600}
.nav-section{padding:16px 20px 4px;font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px}
.main{padding:20px 24px 40px;margin-left:200px;min-height:100vh}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.stat-val{font-size:28px;font-weight:700;color:#1e293b}.stat-label{font-size:12px;color:#94a3b8;margin-top:2px}
.countdown-num{font-size:64px;font-weight:800;color:#2563eb;line-height:1}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;justify-content:center;align-items:center}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;max-width:520px;width:90%;max-height:80vh;overflow-y:auto}
.modal h3{font-size:18px;font-weight:600;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:#64748b;margin-bottom:4px;font-weight:500}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 10px;font-size:11px;color:#94a3b8;font-weight:500;border-bottom:1px solid #f1f5f9}
td{padding:8px 10px;border-bottom:1px solid #f8fafc;font-size:13px}
progress{display:block;height:8px;border-radius:4px;background:#e2e8f0;width:100%}
progress::-webkit-progress-bar{background:#e2e8f0}
progress::-webkit-progress-value{background:#3b82f6;border-radius:4px}
.chart-wrap{position:relative;height:260px}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day-header{text-align:center;font-size:11px;color:#94a3b8;padding:6px 0}
.cal-cell{border-radius:6px;padding:6px;min-height:70px;font-size:12px;background:#fff;border:1px solid #f1f5f9;cursor:pointer}
.cal-cell:hover{border-color:#93c5fd}.cal-cell.today{background:#eff6ff;border-color:#93c5fd}
.cal-cell .date-num{font-weight:600;font-size:13px;margin-bottom:2px}
.cal-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:3px}
.cal-dot.study{background:#3b82f6}.cal-dot.workout{background:#22c55e}
@media(max-width:768px){.sidebar{width:60px;padding:10px 0}.sidebar-logo{font-size:0;padding:0;justify-content:center;border:none;margin-bottom:4px}.sidebar-logo span{font-size:24px}.nav-item span:last-child{display:none}.nav-section{display:none}.nav-item{justify-content:center;padding:12px 0}.main{margin-left:60px;padding:16px}.grid-2,.grid-4{grid-template-columns:1fr}.countdown-num{font-size:40px}}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="page active" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#eff6ff 0%,#dbeafe 100%)">
<div style="text-align:center;max-width:360px;width:90%">
<div style="font-size:48px;margin-bottom:12px">📚</div>
<h1 style="font-size:24px;font-weight:700;color:#1e293b;margin-bottom:6px">个人书房</h1>
<p style="font-size:13px;color:#94a3b8;margin-bottom:28px">考研备考 · 健身管理</p>
<p id="loginHint" style="font-size:13px;color:#64748b;margin-bottom:8px">首次使用请设置密码</p>
<input type="password" id="loginPwd" class="input" placeholder="输入密码" style="text-align:center;font-size:16px;padding:12px;margin-bottom:12px" onkeydown="if(event.key==='Enter')doLogin()">
<button class="btn btn-primary" onclick="doLogin()" style="width:100%;padding:12px;font-size:15px">进入</button>
<p id="loginMsg" style="font-size:12px;color:#dc2626;margin-top:10px;display:none"></p>
</div></div>

<!-- MAIN APP -->
<div id="mainApp" class="page" style="display:none">
<nav class="sidebar">
<div class="sidebar-logo"><span>📚</span> 个人书房</div>
<button class="nav-item active" data-page="dashboard"><span>🏠</span><span>首页看板</span></button>
<div class="nav-section">考研学习</div>
<button class="nav-item" data-page="journal"><span>📖</span><span>学习日志</span></button>
<button class="nav-item" data-page="plans"><span>📋</span><span>学习计划</span></button>
<button class="nav-item" data-page="errors"><span>❌</span><span>错题本</span></button>
<button class="nav-item" data-page="files"><span>📁</span><span>文件资料库</span></button>
<div class="nav-section">健身记录</div>
<button class="nav-item" data-page="workout"><span>💪</span><span>训练打卡</span></button>
<button class="nav-item" data-page="body"><span>📊</span><span>身体数据</span></button>
<button class="nav-item" data-page="diet"><span>🍽</span><span>饮食记录</span></button>
<button class="nav-item" data-page="training"><span>🏋</span><span>训练计划</span></button>
<div class="nav-section">其他</div>
<button class="nav-item" data-page="calendar"><span>📅</span><span>日历视图</span></button>
<button class="nav-item" data-page="settings"><span>⚙</span><span>设置</span></button>
</nav>
<div class="main" id="mainContent"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
<div class="modal" id="modalContent"></div>
</div>

<script src="app.js?v=5"></script>
<script src="sync.js?v=3"></script>
</body>
</html>
